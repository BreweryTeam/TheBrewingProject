name: Publish Plugin

on:
  release:
    types:
      - released

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Hangar
        run: "./gradlew :bukkit-impl:publishAllPublicationsToHangar"
        env:
          VERSION: ${{github.event.release.tag_name}}
          RELEASE_NOTES: ${{ github.event.release.body }}
          API_KEY: ${{ secrets.HANGAR_PUBLISH_KEY }}
      - name: Publish to Modrinth
        run: "./gradlew :bukkit-impl:modrinth"
        env:
          VERSION: ${{github.event.release.tag_name}}
          RELEASE_NOTES: ${{ github.event.release.body }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_PUBLISH_KEY }}
      - name: Publish to maven repo
        run: |
          ./gradlew publishAllPublicationsToBreweryteamRepository \
          -PbreweryteamUsername=${{ secrets.BREWERY_REPO_USERNAME }} \
          -PbreweryteamPassword=${{ secrets.BREWERY_REPO_PASSWORD }}
        env:
          VERSION: ${{github.event.release.tag_name}}
      - name: Display in discord
        run: "./gradlew :bukkit-impl:postDiscordMessage"
        env:
          VERSION: ${{github.event.release.tag_name}}
          RELEASE_NOTES: ${{ github.event.release.body }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}