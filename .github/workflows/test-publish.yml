name: Test publish
on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "Version to test release"
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to maven repo
        run: |
          ./gradlew publishAllPublicationsToBreweryteamRepository \
          -PbreweryteamUsername=${{ secrets.BREWERY_REPO_USERNAME }} \
          -PbreweryteamPassword=${{ secrets.BREWERY_REPO_PASSWORD }}
        env:
          VERSION: ${{ inputs.version }}